# ============================================================
# MecaIA V3 — Configuration Netlify
# ============================================================
[build]
  command = "echo 'No build step'"
  functions = "netlify/functions"
  publish = "."

# Ces clés sont PUBLIQUES (identifiants de prix, clé publique Stripe, URL + clé anon
# Supabase) : normal qu'elles apparaissent côté client. On dit au scanner de Netlify
# de ne PAS les traiter comme des secrets. Les vrais secrets (STRIPE_SECRET_KEY,
# SUPABASE_SECRET, ANTHROPIC_KEY, RESEND_API_KEY, STRIPE_WEBHOOK_SECRET) restent scannés.
[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "OWNER_EMAIL,SUPABASE_URL,SUPABASE_ANON,STRIPE_PUBLIC_KEY,FRONTEND_URL,STRIPE_PRICE_1CREDIT,STRIPE_PRICE_25CREDITS,STRIPE_PRICE_60CREDITS,STRIPE_PRICE_UNLIMITED,STRIPE_PRICE_1EUR,STRIPE_PRICE_5EUR,STRIPE_PRICE_10EUR,STRIPE_PRICE_15EUR"

[functions]
  # esbuild embarque les imports (../lib/auth.mjs) et les node_modules
  node_bundler = "esbuild"

# Les routes /.netlify/functions/* sont gérées nativement par Netlify.
# SPA : tout le reste renvoie index.html.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

