# ============================================================
# 🔧 MECAIA — CONFIGURATION NETLIFY
# Ce fichier dit à Netlify :
#   - où trouver le backend (les "fonctions")
#   - comment transformer l'adresse /api en appel à api.js
# Place ce fichier à la RACINE de ton projet (à côté de index.html).
# ============================================================

[build]
  # Dossier où vivent les fonctions backend.
  functions = "netlify/functions"
  # Pas d'étape de build : c'est un site HTML simple.
  publish = "."

# Raccourci d'adresse : appeler /api  →  exécute netlify/functions/api.js
# (plus propre que /.netlify/functions/api dans le code du site)
[[redirects]]
  from = "/api"
  to = "/.netlify/functions/api"
  status = 200

# Sécurité : quelques en-têtes de base pour le site.
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
