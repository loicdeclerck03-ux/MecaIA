[build]
  publish = "."
  command = ""
  functions = "netlify/functions"

[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "SUPABASE_ANON,STRIPE_PUBLIC_KEY"

[functions.scheduled_weekly_health]
  schedule = "0 8 * * 1"

[functions.scheduled_ct_reminder]
  schedule = "0 8 * * *"

# SEO Pages DTC
