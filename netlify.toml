[build]
  publish = "."
  command = ""
  functions = "netlify/functions"

[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "SUPABASE_ANON,STRIPE_PUBLIC_KEY"

# ── Timeout etendu (plan Pro = jusqu a 26s) — appels IA NEXUS plus longs
# que la limite par defaut 10s. Si toujours en echec apres deploy malgre
# cette config: contacter le support Netlify pour activer manuellement
# "extended function timeout" cote compte (pattern documente forums Netlify 2026).
[functions."nexus_orchestrator"]
  timeout = 26

[functions."nexus_parts_price"]
  timeout = 26


[functions.scheduled_weekly_health]
  schedule = "0 8 * * 1"

[functions.scheduled_ct_reminder]
  schedule = "0 8 * * *"

[functions.scheduled_relance]
  schedule = "0 9 * * *"

[functions.scheduled_onboarding]
  schedule = "0 9 * * *"

[functions.scheduled_newsletter_cold]
  schedule = "0 10 * * *"

# ── Security headers — qualite Google / OWASP ──────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-XSS-Protection = "1; mode=block"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=(self), usb=()"
    Cross-Origin-Opener-Policy = "same-origin-allow-popups"

[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Headers = "Content-Type, Authorization"
    Access-Control-Allow-Methods = "GET, POST, OPTIONS"

# ── Cache headers statiques ─────────────────────────────────────
[[headers]]
  for = "*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/icon-*.png"
  [headers.values]
    Cache-Control = "public, max-age=604800"

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "public, max-age=86400"
    Content-Type = "application/manifest+json; charset=utf-8"

