
[functions.scheduled_weekly_health]
  schedule = "0 8 * * 1"

[functions.scheduled_ct_reminder]
  schedule = "0 8 * * *"

# SEO Pages DTC
[[redirects]]
  from = "/codes/:code"
  to = "/codes/:code.html"
  status = 200
  force = false

# Alternative Carly
[[redirects]]
  from = "/alternative-carly"
  to = "/alternative-carly.html"
  status = 200
  force = false
# Page Beta
[[redirects]]
  from = "/beta"
  to = "/beta.html"
  status = 200
  force = false
[functions.scheduled_relance]
  schedule = "0 9 * * *"

[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Headers = "Content-Type, Authorization"
    Access-Control-Allow-Methods = "GET, POST, OPTIONS"
# Comparatif OBD IA
[[redirects]]
  from = "/comparatif-obd-ia"
  to = "/comparatif-obd-ia.html"
  status = 200
  force = false

[functions.scheduled_onboarding]
  schedule = "0 9 * * *"
