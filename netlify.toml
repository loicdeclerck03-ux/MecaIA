# ============================================================
# MecaIA V3 — Configuration Netlify
# ============================================================
[build]
  command = "echo 'No build step'"
  functions = "netlify/functions"
  publish = "."

[functions]
  # esbuild embarque les imports (../lib/auth.mjs) et les node_modules
  node_bundler = "esbuild"

# Les routes /.netlify/functions/* sont gérées nativement par Netlify.
# SPA : tout le reste renvoie index.html.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ------------------------------------------------------------
# Pipeline planifié (accumulation de cas) — lundi & jeudi 3h UTC
# ------------------------------------------------------------
[[scheduled]]
  cron = "0 3 * * 1"
  function = "scheduled_pipeline"

[[scheduled]]
  cron = "0 3 * * 4"
  function = "scheduled_pipeline"
